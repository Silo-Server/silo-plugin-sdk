syntax = "proto3";

package silo.plugin.v1;

option go_package = "github.com/Silo-Server/silo-plugin-sdk/pkg/pluginproto/silo/plugin/v1;pluginv1";

import "google/protobuf/struct.proto";

service ScheduledTask {
  rpc Run(RunScheduledTaskRequest) returns (RunScheduledTaskResponse);
}

message RunScheduledTaskRequest {
  string task_key = 1;
  google.protobuf.Struct input = 2;
}

message RunScheduledTaskResponse {
  google.protobuf.Struct output = 1;
}
